<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Ascii Art Web</title>

        <style>
            body {
                font-family: Arial, Helvetica, sans-serif;
                background-color: #f4f4f4;
                margin: 40px;
            }

            h1 {
                color: #333;
            }

            form {
                margin-bottom: 20px;
            }

            textarea {
                width: 100%;
                max-width: 600px;
                padding: 10px;
                font-size: 16px;
                resize: vertical;
            }

            .banner-options {
                margin: 15px 0;
            }

            button {
                padding: 10px 20px;
                font-size: 16px;
                cursor: pointer;
            }

            pre {
                background-color: #222;
                color: #00ff88;
                padding: 20px;
                overflow-x: auto;
                white-space: pre;
                border-radius: 5px;
            }
        </style>
    </head>
    <body>
        <h1>Ascii Art Generator</h1>

        <form action="/ascii-art" method="POST">
            <textarea name="text" rows="6" placeholder="Enter text here ..." required></textarea>

            <div class="banner-options">
                <label>
                    <input type="radio" name="banner" value="standard" checked>
                    Standard
                </label>
                <label>
                    <input type="radio" name="banner" value="shadow">
                    Shadow
                </label>
                <label>
                    <input type="radio" name="banner" value="thinkertoy">
                    Thinkertoy
                </label>
            </div>

            <button type="submit">Generate ASCII Art</button>
        </form>

        {{if .Result}}
            <h2>Result:</h2>

            <pre>{{.Result}}</pre>
        {{end}}
        
    </body>
</html>
